version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ticket_api_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - ticket_network
    depends_on:
      - sqlserver

  nginx:
    image: nginx:alpine
    container_name: ticket_api_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ticket_network
    depends_on:
      - app

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ticket_api_sqlserver
    restart: unless-stopped
    environment:
      SA_PASSWORD: "TicketApi@2024"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - ticket_network

networks:
  ticket_network:
    driver: bridge

volumes:
  sqlserver_data:
